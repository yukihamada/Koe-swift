<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3B30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Black rounded square background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="#0A0A0A"/>

  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="none" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Waveform bars — 7 bars, varying heights, centered -->
  <!-- Bar center X positions: 356, 398, 440, 512, 584, 626, 668 -->
  <!-- Heights: 140, 220, 300, 380, 300, 220, 140 -->
  <!-- Bar width: 36px, rounded caps -->
  <!-- Vertical center of bars: 460 -->

  <!-- Bar 1 (leftmost, short) -->
  <rect x="338" y="390" width="36" height="140" rx="18" ry="18" fill="url(#waveGrad)"/>

  <!-- Bar 2 -->
  <rect x="394" y="350" width="36" height="220" rx="18" ry="18" fill="url(#waveGrad)"/>

  <!-- Bar 3 -->
  <rect x="450" y="310" width="36" height="300" rx="18" ry="18" fill="url(#waveGrad)"/>

  <!-- Bar 4 (center, tallest) -->
  <rect x="506" y="270" width="36" height="380" rx="18" ry="18" fill="url(#waveGrad)"/>

  <!-- Bar 5 -->
  <rect x="562" y="310" width="36" height="300" rx="18" ry="18" fill="url(#waveGrad)"/>

  <!-- Bar 6 -->
  <rect x="618" y="350" width="36" height="220" rx="18" ry="18" fill="url(#waveGrad)"/>

  <!-- Bar 7 (rightmost, short) -->
  <rect x="674" y="390" width="36" height="140" rx="18" ry="18" fill="url(#waveGrad)"/>

  <!-- 声 character — white, thin, below bars -->
  <text
    x="512"
    y="760"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif CJK JP', serif"
    font-size="160"
    font-weight="200"
    fill="white"
    fill-opacity="0.92"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2">声</text>
</svg>

name: Koe
options:
  bundleIdPrefix: com.yuki
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 5BV85JW8US
    CODE_SIGN_STYLE: Automatic

targets:
  Koe:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "CWhisper/**"
          - "CSolunaRing/**"
          - "include/**"
          - "ggml-metal.metal"
          - "ggml-common.h"
          - "ggml-metal-impl.h"
      - path: Sources/CSolunaRing/soluna_ring.c
        buildPhase: sources
        compilerFlags: "-std=c11"
      - path: Sources/ggml-metal.metal
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuki.koe.ios
        INFOPLIST_FILE: Info.plist
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_OBJC_BRIDGING_HEADER: "Sources/Koe-Bridging-Header.h"
        SWIFT_INCLUDE_PATHS: "$(PROJECT_DIR)/Sources/CWhisper $(PROJECT_DIR)/Sources/CSolunaRing"
        HEADER_SEARCH_PATHS: "$(PROJECT_DIR)/Sources/include $(PROJECT_DIR)/Sources"
        LIBRARY_SEARCH_PATHS: "$(PROJECT_DIR)/lib"
        OTHER_LDFLAGS: "-lsoluna_core -lwhisper -lggml -lggml-base -lggml-cpu -lggml-metal -lggml-blas -lstdc++ -framework Accelerate -framework Metal -framework MetalKit -framework CoreMotion -framework AudioToolbox -framework CallKit -framework EventKit"
        MTL_HEADER_SEARCH_PATHS: "$(PROJECT_DIR)/Sources"
        GENERATE_INFOPLIST_FILE: "NO"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    entitlements:
      path: Koe.entitlements
    dependencies:
      - target: KoeKeyboard
        embed: true
      - target: KoeShareExt
        embed: true
      - target: KoeWidget
        embed: true

  KoeKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: KoeKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuki.koe.ios.keyboard
        INFOPLIST_FILE: KoeKeyboard/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1,2"

  KoeShareExt:
    type: app-extension
    platform: iOS
    sources:
      - path: KoeShareExt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuki.koe.ios.shareext
        INFOPLIST_FILE: KoeShareExt/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1,2"

  KoeWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: KoeWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuki.koe.ios.widget
        INFOPLIST_FILE: KoeWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1,2"

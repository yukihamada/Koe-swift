name: Build & Release DMG + PKG

on:
  push:
    tags:
      - 'v*'

# Build artefacts are now uploaded as workflow artifacts only — release.sh
# (run locally by the maintainer) is the canonical path for uploading
# Gatekeeper-clean .dmg / .pkg to GitHub Releases. CI cannot notarize
# because the maintainer's Apple ID password and Developer ID p12 are not
# stored in repo secrets, and `codesign` without notarization still trips
# Gatekeeper on macOS 10.15+. Letting CI `gh release upload` here would
# overwrite the maintainer's notarized assets with adhoc-signed ones.
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install whisper-cpp llama.cpp

      - name: Build DMG (adhoc, sanity check only)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          chmod +x build-dmg.sh
          bash build-dmg.sh

      - name: Build PKG (adhoc, sanity check only)
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          chmod +x build-pkg.sh
          bash build-pkg.sh

      # Upload to workflow artifacts (NOT the release page) so the build is
      # still useful as a CI sanity check / for inspection via the Actions UI,
      # without clobbering the maintainer's notarized release.sh upload.
      - name: Upload adhoc artefacts (workflow only, not Release)
        uses: actions/upload-artifact@v4
        with:
          name: koe-macos-adhoc-${{ github.ref_name }}
          path: |
            Koe-Installer.dmg
            Koe.pkg
          if-no-files-found: warn
          retention-days: 14

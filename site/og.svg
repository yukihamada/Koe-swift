<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="0.5" stop-color="#111118"/>
      <stop offset="1" stop-color="#1a0a1e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b30"/>
      <stop offset="1" stop-color="#ff9500"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="315" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3b30" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff3b30" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="315" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9500" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff9500" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative waveform (right side) -->
  <g transform="translate(820, 315)" opacity="0.12">
    <rect x="0" y="-100" width="14" height="200" rx="7" fill="url(#wave)"/>
    <rect x="32" y="-65" width="14" height="130" rx="7" fill="url(#wave)"/>
    <rect x="64" y="-120" width="14" height="240" rx="7" fill="url(#wave)"/>
    <rect x="96" y="-50" width="14" height="100" rx="7" fill="url(#wave)"/>
    <rect x="128" y="-85" width="14" height="170" rx="7" fill="url(#wave)"/>
    <rect x="160" y="-130" width="14" height="260" rx="7" fill="url(#wave)"/>
    <rect x="192" y="-55" width="14" height="110" rx="7" fill="url(#wave)"/>
    <rect x="224" y="-95" width="14" height="190" rx="7" fill="url(#wave)"/>
    <rect x="256" y="-40" width="14" height="80" rx="7" fill="url(#wave)"/>
    <rect x="288" y="-75" width="14" height="150" rx="7" fill="url(#wave)"/>
  </g>

  <!-- App icon (large, centered-left) -->
  <g transform="translate(80, 120)">
    <rect width="100" height="100" rx="24" fill="#141414"/>
    <rect width="100" height="100" rx="24" fill="none" stroke="url(#wave)" stroke-width="1.5" stroke-opacity="0.3"/>
    <g transform="translate(50,50)">
      <rect x="-3" y="-28" width="6" height="56" rx="3" fill="url(#wave)"/>
      <rect x="-15" y="-20" width="6" height="40" rx="3" fill="url(#wave)" opacity=".8"/>
      <rect x="9" y="-22" width="6" height="44" rx="3" fill="url(#wave)" opacity=".85"/>
      <rect x="-27" y="-14" width="6" height="28" rx="3" fill="url(#wave)" opacity=".6"/>
      <rect x="21" y="-16" width="6" height="32" rx="3" fill="url(#wave)" opacity=".65"/>
    </g>
  </g>

  <!-- Title -->
  <text x="200" y="185" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="700" fill="url(#wave)" letter-spacing="-3">Koe</text>
  <text x="370" y="185" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#777" letter-spacing="2">(声)</text>

  <!-- Main tagline — big and bold -->
  <text x="80" y="280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="600" fill="#ffffff">Mac で最も速い日本語音声入力</text>

  <!-- Sub tagline -->
  <text x="80" y="330" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#888">whisper.cpp + Metal GPU で完全ローカル処理</text>

  <!-- Feature pills -->
  <g transform="translate(80, 390)">
    <rect width="180" height="44" rx="22" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="90" y="28" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="500" fill="#e0e0e0" text-anchor="middle">0.5秒で変換</text>
  </g>
  <g transform="translate(280, 390)">
    <rect width="200" height="44" rx="22" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="100" y="28" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="500" fill="#e0e0e0" text-anchor="middle">クラウド不要</text>
  </g>
  <g transform="translate(500, 390)">
    <rect width="160" height="44" rx="22" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="80" y="28" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="500" fill="#e0e0e0" text-anchor="middle">無料</text>
  </g>

  <!-- CTA button -->
  <g transform="translate(80, 490)">
    <rect width="280" height="56" rx="14" fill="url(#wave)"/>
    <text x="140" y="36" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">今すぐダウンロード</text>
  </g>

  <!-- URL -->
  <text x="390" y="526" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#666">koe.elio.love</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#wave)" opacity="0.6"/>

  <!-- macOS badge (bottom right) -->
  <text x="1120" y="590" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#555" text-anchor="end">macOS 13+ | Apple Silicon &amp; Intel | MIT License</text>
</svg>

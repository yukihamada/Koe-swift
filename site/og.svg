<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b30"/>
      <stop offset="1" stop-color="#ff9500"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3b30"/>
      <stop offset="1" stop-color="#cc2d25"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,100)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,200)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,400)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,500)"/>
  </g>

  <!-- Waveform visualization (right side, decorative) -->
  <g transform="translate(850, 315)" opacity="0.15">
    <rect x="0" y="-120" width="12" height="240" rx="6" fill="url(#wave)"/>
    <rect x="30" y="-80" width="12" height="160" rx="6" fill="url(#wave)"/>
    <rect x="60" y="-140" width="12" height="280" rx="6" fill="url(#wave)"/>
    <rect x="90" y="-60" width="12" height="120" rx="6" fill="url(#wave)"/>
    <rect x="120" y="-100" width="12" height="200" rx="6" fill="url(#wave)"/>
    <rect x="150" y="-150" width="12" height="300" rx="6" fill="url(#wave)"/>
    <rect x="180" y="-70" width="12" height="140" rx="6" fill="url(#wave)"/>
    <rect x="210" y="-110" width="12" height="220" rx="6" fill="url(#wave)"/>
    <rect x="240" y="-50" width="12" height="100" rx="6" fill="url(#wave)"/>
  </g>

  <!-- App icon -->
  <g transform="translate(100, 160)">
    <rect width="80" height="80" rx="18" fill="#111"/>
    <rect width="80" height="80" rx="18" fill="none" stroke="#333" stroke-width="1"/>
    <g transform="translate(40,40)">
      <rect x="-2.5" y="-22" width="5" height="44" rx="2.5" fill="url(#wave)"/>
      <rect x="-14" y="-15" width="5" height="30" rx="2.5" fill="url(#wave)" opacity=".8"/>
      <rect x="9" y="-17" width="5" height="34" rx="2.5" fill="url(#wave)" opacity=".85"/>
      <rect x="-25" y="-10" width="5" height="20" rx="2.5" fill="url(#wave)" opacity=".6"/>
      <rect x="20" y="-12" width="5" height="24" rx="2.5" fill="url(#wave)" opacity=".65"/>
    </g>
  </g>

  <!-- Title: Koe -->
  <text x="200" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">Koe</text>
  <text x="330" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="300" fill="#888" letter-spacing="1">声</text>

  <!-- Tagline -->
  <text x="100" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="500" fill="#e0e0e0">Mac で最も速い日本語音声入力</text>

  <!-- Features -->
  <g transform="translate(100, 370)" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#999">
    <g>
      <rect width="8" height="8" rx="4" fill="url(#wave)" y="-6"/>
      <text x="20" y="0">完全ローカル処理 — プライバシー最優先</text>
    </g>
    <g transform="translate(0,44)">
      <rect width="8" height="8" rx="4" fill="url(#wave)" y="-6"/>
      <text x="20" y="0">whisper.cpp + Metal GPU — 0.5秒で変換</text>
    </g>
    <g transform="translate(0,88)">
      <rect width="8" height="8" rx="4" fill="url(#wave)" y="-6"/>
      <text x="20" y="0">月額0円 — クラウド不要、サブスク不要</text>
    </g>
  </g>

  <!-- macOS badge -->
  <g transform="translate(100, 545)">
    <rect width="160" height="36" rx="8" fill="url(#badge)"/>
    <text x="80" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">Download Free</text>
  </g>

  <!-- URL -->
  <text x="290" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#666">koe.elio.love</text>

  <!-- macOS 13+ label -->
  <text x="1100" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#444" text-anchor="end">macOS 13+ | Apple Silicon</text>
</svg>

name: Koe
options:
  bundleIdPrefix: com.yuki
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 5BV85JW8US
    CODE_SIGN_STYLE: Automatic

targets:
  Koe:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "CWhisper/**"
          - "ggml-metal.metal"
          - "ggml-common.h"
          - "ggml-metal-impl.h"
      - path: Sources/ggml-metal.metal
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuki.koe.ios
        INFOPLIST_FILE: Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_INCLUDE_PATHS: "$(PROJECT_DIR)/Sources/CWhisper"
        LIBRARY_SEARCH_PATHS: "$(PROJECT_DIR)/lib"
        OTHER_LDFLAGS: "-lwhisper -lggml -lggml-base -lggml-cpu -lggml-metal -lggml-blas -lstdc++ -framework Accelerate -framework Metal -framework MetalKit"
        MTL_HEADER_SEARCH_PATHS: "$(PROJECT_DIR)/Sources"
        GENERATE_INFOPLIST_FILE: "NO"
    entitlements:
      path: Koe.entitlements
    dependencies:
      - target: KoeKeyboard
        embed: true
      - target: KoeShareExt
        embed: true

  KoeKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: KoeKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuki.koe.ios.keyboard
        INFOPLIST_FILE: KoeKeyboard/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"

  KoeShareExt:
    type: app-extension
    platform: iOS
    sources:
      - path: KoeShareExt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuki.koe.ios.shareext
        INFOPLIST_FILE: KoeShareExt/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
